# Mode bêta : les checks stricts sont désactivés pour accélérer les hotfix.
# Ce workflow ne se lance PAS automatiquement au push — il n’empêche pas Vercel.
# À réactiver avant production stable — voir docs/DEPLOY-BETA.md
#
# Pour lancer manuellement : GitHub → Actions → CI (optionnel) → Run workflow

name: CI (optionnel)

on:
  workflow_dispatch:

concurrency:
  group: ci-manual-${{ github.ref }}
  cancel-in-progress: true

jobs:
  quality:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: esther
          POSTGRES_PASSWORD: esther
          POSTGRES_DB: esther_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U esther -d esther_test"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10

    env:
      DATABASE_URL: postgresql://esther:esther@localhost:5432/esther_test?schema=public
      SESSION_SECRET: ci-test-session-secret-min-32-chars!!
      APP_ENV: development
      NODE_ENV: test
      EMAIL_PROVIDER: mock
      STORAGE_PROVIDER: local
      STORAGE_PATH: /tmp/esther-uploads-ci
      SEED_DEV_DATA: "false"

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Generate Prisma client
        run: npx prisma generate

      - name: Apply migrations
        run: npx prisma migrate deploy

      - name: Seed roles and permissions
        run: npm run db:seed:production
        env:
          SEED_DEV_DATA: "false"

      - name: Lint
        run: npm run lint

      - name: Typecheck
        run: npm run typecheck

      - name: Unit tests
        run: npm test

      - name: Production build
        run: npm run build
        env:
          NEXT_PUBLIC_APP_ENV: test
          NEXT_PUBLIC_APP_NAME: Nova Gestion
