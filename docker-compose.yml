services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: esther
      POSTGRES_PASSWORD: esther
      POSTGRES_DB: esther
    volumes:
      - esther_pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U esther -d esther"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  esther_pg_data:
